<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECIT — Portal Escolar</title>
<style>
  :root {
    --primary: #2563EB;
    --primary-dark: #1E3A8A;
    --success: #16A34A;
    --danger: #DC2626;
    --bg: #F4F6FB;
    --panel: #FFFFFF;
    --border: #E7EBF3;
    --text: #111827;
    --muted: #6B7280;
    --hover: #F1F5FD;
  }
  * { box-sizing: border-box; }
  body.dark {
    --bg: #0B1220;
    --panel: #121B2E;
    --border: #1E2A41;
    --text: #EAF0FB;
    --muted: #8B98B3;
    --hover: #182338;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    transition: background .3s, color .3s;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 12px;
    height: 60px; padding: 0 16px;
    background: var(--panel); border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; cursor: pointer; }
  .logo-tile {
    width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center;
    color: #fff; background: linear-gradient(135deg,var(--primary),var(--primary-dark));
  }
  .admin-tag {
    font-size: 11px; font-weight: 700; color: #fff; background: linear-gradient(135deg,#EA580C,#DC2626);
    padding: 3px 8px; border-radius: 999px; margin-left: 4px;
  }
  .spacer { flex: 1; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px; border: none; background: var(--hover);
    color: var(--text); cursor: pointer; font-size: 16px; display: grid; place-items: center;
  }
  nav.tabs {
    display: flex; gap: 4px; overflow-x: auto; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--border);
  }
  nav.tabs button {
    white-space: nowrap; border: none; background: transparent; color: var(--muted);
    padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500;
  }
  nav.tabs button.active { background: var(--primary); color: #fff; }
  main { max-width: 1000px; margin: 0 auto; padding: 20px 16px 60px; }
  h1.page-title { font-size: 22px; margin: 0 0 4px; }
  p.page-sub { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
    padding: 18px; margin-bottom: 16px;
  }
  .card h3 { margin: 0 0 12px; font-size: 15px; }
  .grid { display: grid; gap: 14px; grid-template-columns: 1fr; }
  @media (min-width: 640px) { .grid.cols-2 { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 900px) { .grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; } }
  .hero { text-align: center; padding: 30px 16px; }
  .hero-letters { display: flex; justify-content: center; gap: 10px; margin: 16px 0; }
  .hero-letters span {
    width: 52px; height: 52px; border-radius: 16px; display: grid; place-items: center;
    color: #fff; font-weight: 800; font-size: 24px; background: linear-gradient(135deg,var(--primary),var(--primary-dark));
  }
  .row { display: flex; align-items: center; gap: 10px; }
  .row-between { display: flex; align-items: center; justify-content: space-between; }
  .pill { display: inline-block; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
  .stat-tile { text-align: center; border-radius: 14px; padding: 12px; background: var(--hover); }
  .stat-tile b { display: block; font-size: 18px; }
  .stat-tile span { font-size: 11px; color: var(--muted); }
  .list-clean { list-style: none; margin: 0; padding: 0; }
  .list-clean li { background: var(--hover); border-radius: 10px; padding: 8px 12px; margin-bottom: 6px; font-size: 14px; }
  .btn {
    border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 600;
    cursor: pointer; background: var(--primary); color: #fff;
  }
  .btn.outline { background: var(--hover); color: var(--primary); }
  .btn.full { width: 100%; }
  .subject-card { cursor: pointer; }
  .badge {
    width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center;
    color: #fff; font-weight: 700; margin-bottom: 10px;
  }
  select.status-select {
    margin-top: 8px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 12px;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center;
    justify-content: center; z-index: 50; padding: 16px;
  }
  .modal {
    background: var(--panel); border-radius: 18px; padding: 24px; max-width: 340px; width: 100%;
  }
  .modal input {
    width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); margin: 10px 0; font-size: 14px;
  }
  .error-text { color: var(--danger); font-size: 12px; min-height: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 8px 4px; text-align: center; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <button class="logo" onclick="goTo('inicio')" style="border:none;background:none;">
    <span class="logo-tile">E</span>
    <span>ECIT <span id="admin-tag-slot"></span></span>
  </button>
  <div class="spacer"></div>
  <button class="icon-btn" onclick="toggleDark()" title="Alternar tema">🌓</button>
  <button class="icon-btn" onclick="openAdminModal()" title="Modo administrador">🔒</button>
</header>

<nav class="tabs" id="tabs"></nav>

<main>
  <h1 class="page-title" id="page-title"></h1>
  <p class="page-sub" id="page-sub"></p>
  <div id="content"></div>
</main>

<div class="modal-overlay hidden" id="admin-modal">
  <div class="modal">
    <h3>Modo Administrador</h3>
    <p style="font-size:13px;color:var(--muted)">Digite a senha para gerenciar o portal.</p>
    <input type="password" id="admin-pass" placeholder="Senha de administrador">
    <p class="error-text" id="admin-error"></p>
    <button class="btn full" onclick="checkAdminPassword()">Entrar</button>
    <button class="btn outline full" style="margin-top:8px" onclick="closeAdminModal()">Cancelar</button>
  </div>
</div>

<script>
/* ---------------- Senha de administrador ---------------- */
const ADMIN_PASSWORD = "ECIT@Admin2026";
let isAdmin = false;

/* ---------------- Dados (mock) ---------------- */
const disciplinas = [
  { nome: "Matemática", professor: "Profª. Ana Beatriz", horario: "Seg/Qua 07h30", cor: "#2563EB",
    conteudo: ["Funções do 2º grau", "Geometria analítica"], atividades: ["Trabalho — 08/07", "Prova — 15/07"] },
  { nome: "Português", professor: "Prof. Ricardo Melo", horario: "Ter/Qui 08h20", cor: "#7C3AED",
    conteudo: ["Figuras de linguagem", "Redação dissertativa"], atividades: ["Redação — 10/07"] },
  { nome: "Biologia", professor: "Profª. Camila Rocha", horario: "Seg/Sex 09h10", cor: "#16A34A",
    conteudo: ["Genética", "Ecologia"], atividades: ["Relatório — 12/07"] },
  { nome: "História", professor: "Prof. Diego Farias", horario: "Qua/Sex 10h00", cor: "#EA580C",
    conteudo: ["Brasil Colônia", "Revolução Industrial"], atividades: ["Seminário — 18/07"] },
];

const clubes = [
  { nome: "Clube de Robótica", professor: "Prof. Marcos Vinícius", horario: "Qui 14h", integrantes: 18 },
  { nome: "Grêmio Estudantil", professor: "Profª. Camila Rocha", horario: "Seg 15h", integrantes: 24 },
  { nome: "Clube de Teatro", professor: "Prof. Ricardo Melo", horario: "Ter 14h30", integrantes: 15 },
  { nome: "Coral ECIT", professor: "Profª. Juliana Prado", horario: "Qua 13h", integrantes: 21 },
];

const times = [
  { nome: "Furacão 1ºA", v: 5, e: 1, d: 0, pts: 16 },
  { nome: "Águias 2ºB", v: 4, e: 2, d: 0, pts: 14 },
  { nome: "Leões 3ºA", v: 3, e: 1, d: 2, pts: 10 },
  { nome: "Tigres 2ºA", v: 2, e: 2, d: 2, pts: 8 },
];

const cardapio = [
  { item: "Misto quente", preco: 6.0 },
  { item: "Coxinha de frango", preco: 5.5, promo: true },
  { item: "Suco natural 300ml", preco: 4.0 },
  { item: "Prato executivo do dia", preco: 12.0, promo: true },
];

const notificacoes = [
  "🔴 Aula de Física cancelada hoje",
  "🔵 Nova atividade em Matemática",
  "🟣 Reunião de pais — 10/07",
  "🟢 Comprovante de matrícula aprovado",
];

let solicitacoes = [
  { tipo: "Comprovante de matrícula", status: "finalizado", data: "28/06" },
  { tipo: "Histórico escolar", status: "em análise", data: "30/06" },
  { tipo: "Declaração escolar", status: "aprovado", data: "01/07" },
];

let stats = { alunos: 247, professores: 24, funcionarios: 30 };

/* ---------------- Navegação ---------------- */
const PAGES = {
  inicio: { title: "Início", sub: "Bem-vindo de volta, Paulo 👋" },
  disciplinas: { title: "Disciplinas", sub: "Conteúdos e atividades" },
  secretaria: { title: "Secretaria Escolar", sub: "Solicite documentos e acompanhe o status" },
  clubes: { title: "Clubes", sub: "Atividades extracurriculares" },
  interclasse: { title: "Interclasse", sub: "Classificação dos times" },
  cantina: { title: "Cantina", sub: "Cardápio e preços" },
  perfil: { title: "Perfil", sub: "Suas informações" },
};

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = Object.keys(PAGES).map(id =>
    `<button class="${id===currentPage?'active':''}" onclick="goTo('${id}')">${PAGES[id].title}</button>`
  ).join("");
}

let currentPage = "inicio";

function goTo(page) {
  currentPage = page;
  document.getElementById("page-title").textContent = PAGES[page].title;
  document.getElementById("page-sub").textContent = PAGES[page].sub;
  document.getElementById("content").innerHTML = RENDERERS[page]();
  renderTabs();
  window.scrollTo(0,0);
}

/* ---------------- Renderizadores de cada página ---------------- */
const RENDERERS = {
  inicio: () => `
    <div class="card hero">
      <span class="pill" style="background:#2563EB1A;color:#2563EB">✨ Ano letivo 2026</span>
      <div class="hero-letters"><span>E</span><span>C</span><span>I</span><span>T</span></div>
      <p style="color:var(--muted);font-size:14px">Escola Cívico-Integral de Tempo Integral <b>João Da Matta</b> — Mamanguape, PB</p>
    </div>
    <div class="grid cols-3">
      <div class="card"><h3>📊 Estatísticas</h3>
        <div class="grid cols-3" style="gap:8px">
          <div class="stat-tile">${isAdmin ? `<input value="${stats.alunos}" oninput="stats.alunos=this.value" style="width:100%;text-align:center;border:1px solid var(--border);border-radius:6px;background:transparent;color:inherit">` : `<b>${stats.alunos}</b>`}<span>Alunos</span></div>
          <div class="stat-tile">${isAdmin ? `<input value="${stats.professores}" oninput="stats.professores=this.value" style="width:100%;text-align:center;border:1px solid var(--border);border-radius:6px;background:transparent;color:inherit">` : `<b>${stats.professores}</b>`}<span>Professores</span></div>
          <div class="stat-tile">${isAdmin ? `<input value="${stats.funcionarios}" oninput="stats.funcionarios=this.value" style="width:100%;text-align:center;border:1px solid var(--border);border-radius:6px;background:transparent;color:inherit">` : `<b>${stats.funcionarios}</b>`}<span>Funcionários</span></div>
        </div>
      </div>
      <div class="card"><h3>🔔 Notificações</h3>
        <ul class="list-clean">${notificacoes.map(n => `<li>${n}</li>`).join("")}</ul>
      </div>
      <div class="card"><h3>🏫 Secretaria</h3>
        <ul class="list-clean">${solicitacoes.slice(0,3).map(s => `<li class="row-between">${s.tipo} ${statusPill(s.status)}</li>`).join("")}</ul>
        <button class="btn full" onclick="goTo('secretaria')">Ver secretaria</button>
      </div>
    </div>
  `,

  disciplinas: () => `
    <div class="grid cols-2">
      ${disciplinas.map(d => `
        <div class="card subject-card">
          <span class="badge" style="background:${d.cor}">${d.nome.slice(0,2)}</span>
          <h3>${d.nome}</h3>
          <p style="font-size:13px;color:var(--muted);margin:0 0 10px">${d.professor} · ${d.horario}</p>
          <b style="font-size:13px">Conteúdo</b>
          <ul class="list-clean">${d.conteudo.map(c => `<li>${c}</li>`).join("")}</ul>
          <b style="font-size:13px">Atividades</b>
          <ul class="list-clean">${d.atividades.map(a => `<li>${a}</li>`).join("")}</ul>
        </div>
      `).join("")}
    </div>
  `,

  secretaria: () => `
    <div class="card">
      <h3>Nova solicitação</h3>
      <div class="grid cols-2">
        ${["Declaração escolar","Comprovante de matrícula","Histórico escolar","Boletim"].map(tp => `
          <button class="btn outline full" onclick="addSolicitacao('${tp}')">+ ${tp}</button>
        `).join("")}
      </div>
    </div>
    <div class="card">
      <h3>${isAdmin ? "Solicitações (gerenciar)" : "Minhas solicitações"}</h3>
      ${solicitacoes.map((s, i) => `
        <div class="card" style="background:var(--hover);margin-bottom:8px">
          <div class="row-between"><b style="font-size:14px">${s.tipo}</b>${statusPill(s.status)}</div>
          <p style="font-size:12px;color:var(--muted);margin:4px 0 0">Solicitado em ${s.data}</p>
          ${isAdmin ? `
            <select class="status-select" onchange="updateStatus(${i}, this.value)">
              ${["em análise","aprovado","finalizado"].map(o => `<option value="${o}" ${o===s.status?'selected':''}>${o}</option>`).join("")}
            </select>
          ` : ""}
        </div>
      `).join("")}
    </div>
  `,

  clubes: () => `
    <div class="grid cols-2">
      ${clubes.map((c, i) => `
        <div class="card">
          <h3>${c.nome}</h3>
          <p style="font-size:13px;color:var(--muted)">${c.professor} · ${c.horario} · ${c.integrantes} integrantes</p>
          <button class="btn full" id="club-btn-${i}" onclick="toggleClub(${i})">Entrar</button>
        </div>
      `).join("")}
    </div>
  `,

  interclasse: () => `
    <div class="card">
      <h3>Classificação</h3>
      <table>
        <thead><tr><th>Time</th><th>V</th><th>E</th><th>D</th><th>Pts</th></tr></thead>
        <tbody>
          ${times.map(t => `<tr><td>${t.nome}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td><td><b style="color:var(--primary)">${t.pts}</b></td></tr>`).join("")}
        </tbody>
      </table>
    </div>
  `,

  cantina: () => `
    <div class="card">
      <h3>🍽️ Cardápio</h3>
      ${cardapio.map(c => `
        <div class="row-between" style="padding:8px 0;border-bottom:1px solid var(--border)">
          <span>${c.item} ${c.promo ? '<span class="pill" style="background:#16A34A1A;color:#16A34A">Promoção</span>' : ""}</span>
          <b>R$ ${c.preco.toFixed(2)}</b>
        </div>
      `).join("")}
    </div>
  `,

  perfil: () => `
    <div class="card" style="text-align:center">
      <div style="width:80px;height:80px;border-radius:50%;margin:0 auto 12px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:26px;background:linear-gradient(135deg,#60A5FA,#2563EB)">PA</div>
      <h3 style="margin-bottom:2px">Paulo Andrade</h3>
      <p style="font-size:13px;color:var(--muted)">3º ano B · Matrícula 2026089</p>
      <span class="pill" style="background:#2563EB1A;color:#2563EB">🎓 Aluno${isAdmin ? " · Admin" : ""}</span>
    </div>
    <div class="card">
      <h3>Desempenho</h3>
      <div class="grid cols-2">
        <div class="stat-tile"><b style="color:var(--primary)">8.7</b><span>Média geral</span></div>
        <div class="stat-tile"><b style="color:var(--primary)">23/25</b><span>Atividades entregues</span></div>
      </div>
    </div>
  `,
};

function statusPill(status) {
  const map = { "em análise": ["#D97706","Em análise"], "aprovado": ["#2563EB","Aprovado"], "finalizado": ["#16A34A","Finalizado"] };
  const [color,label] = map[status] || map["em análise"];
  return `<span class="pill" style="color:${color};background:${color}1A">${label}</span>`;
}

function addSolicitacao(tipo) {
  solicitacoes.unshift({ tipo, status: "em análise", data: "hoje" });
  goTo("secretaria");
}

function updateStatus(i, status) {
  solicitacoes[i].status = status;
  goTo("secretaria");
}

function toggleClub(i) {
  const btn = document.getElementById("club-btn-" + i);
  const joined = btn.textContent.includes("Participando");
  btn.textContent = joined ? "Entrar" : "✓ Participando";
  btn.className = joined ? "btn full" : "btn full outline";
}

/* ---------------- Tema escuro ---------------- */
function toggleDark() {
  document.body.classList.toggle("dark");
}

/* ---------------- Modo administrador ---------------- */
function openAdminModal() {
  document.getElementById("admin-modal").classList.remove("hidden");
  document.getElementById("admin-pass").value = "";
  document.getElementById("admin-error").textContent = "";
}
function closeAdminModal() {
  document.getElementById("admin-modal").classList.add("hidden");
}
function checkAdminPassword() {
  const val = document.getElementById("admin-pass").value;
  if (val === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById("admin-tag-slot").innerHTML = '<span class="admin-tag">Admin</span>';
    closeAdminModal();
    goTo(currentPage);
  } else {
    document.getElementById("admin-error").textContent = "Senha incorreta.";
  }
}

/* ---------------- Início ---------------- */
goTo("inicio");
</script>
</body>
</html>
